<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KidsPlay Hub</title>
  <meta name="description" content="A simple hub for EnsieT kids and games projects." />
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(12, 25, 45, 0.88);
      --panel-2: rgba(20, 39, 68, 0.95);
      --text: #eef5ff;
      --muted: #b7c7e6;
      --accent: #7dd3fc;
      --accent-2: #a78bfa;
      --accent-3: #34d399;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 24px 60px rgba(0,0,0,0.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(167, 139, 250, 0.18), transparent 32%),
        linear-gradient(180deg, #08101c 0%, #0b1730 50%, #07111f 100%);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .container {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(6, 13, 25, 0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .brand strong {
      font-size: 1.05rem;
      letter-spacing: 0.02em;
    }

    .brand span,
    .muted {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .nav a,
    .button,
    button {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .nav a:hover,
    .button:hover,
    button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.1);
